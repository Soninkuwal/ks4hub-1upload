<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image Manager</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>📁 Image Manager</h1>

<!-- Create Folder -->
<div class="card">

<h2>Create Folder</h2>

<input type="text" id="folderName" placeholder="Enter Folder Name">

<button onclick="createFolder()">
Create Folder
</button>

</div>

<!-- Select Folder -->
<div class="card">

<h2>Select Folder</h2>

<select id="folderSelect"></select>

</div>

<!-- Upload Local -->
<div class="card">

<h2>Upload From Device</h2>

<input type="file" id="fileInput" accept="image/*">

<button onclick="uploadLocalImage()">
Upload Image
</button>

</div>

<!-- Upload URL -->
<div class="card">

<h2>Upload Using URL</h2>

<input type="text" id="imageUrl" placeholder="Paste Image URL">

<button onclick="uploadUrlImage()">
Upload URL Image
</button>

</div>

<!-- Gallery -->
<div id="gallery"></div>

</div>

<script src="script.js"></script>
</body>
</html>
